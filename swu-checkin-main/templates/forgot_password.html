{% extends "base.html" %}
{% block title %}忘记密码 - 签到系统{% endblock %}
{% set page_id = "forgot-password" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/auth.css') }}">
{% endblock %}

{% block content %}
<div class="container center">
  <section class="card pad-lg auth-card">
    <div class="hero">
      <div class="brand-badge" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <h1 class="hero-title auth-title">重置密码</h1>
      <p class="hero-subtitle auth-subtitle">通过邮箱验证码重置校园网密码</p>
    </div>

    <form class="form" id="forgotForm">
      <div class="form-group">
        <label for="username">校园网账号</label>
        <input class="input" type="text" id="username" name="username" placeholder="请输入校园网账号" required>
      </div>

      <div class="form-group">
        <label for="email">注册邮箱</label>
        <input class="input" type="email" id="email" name="email" placeholder="请输入注册时使用的邮箱" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="email_code">验证码</label>
        <div class="code-row">
          <input class="input" type="text" id="email_code" name="email_code" maxlength="32" placeholder="请输入验证码" required inputmode="numeric" autocomplete="one-time-code">
          <button type="button" class="btn btn-soft code-btn" id="sendCodeBtn">发送验证码</button>
        </div>
      </div>

      <div class="form-group">
        <label for="campus_password">新密码</label>
        <input class="input" type="password" id="campus_password" name="campus_password" placeholder="请输入新密码" required autocomplete="new-password">
      </div>

      <button type="submit" class="btn btn-primary auth-submit" id="submitBtn">重置密码</button>
      <div class="help-error auth-alert" id="message" role="status" aria-live="polite"></div>
    </form>

    <div class="auth-foot auth-foot-row">
      <span>想起密码了？</span>
      <a href="/login">返回登录</a>
    </div>
  </section>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/forgot_password.js') }}"></script>
{% endblock %}
